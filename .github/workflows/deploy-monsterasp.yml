# Deploy to MonsterASP.NET with full OCCT support
# Requires: Windows runner (for MSVC + C++/CLI)

name: Deploy to MonsterASP.NET (Full OCCT)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild (for C++/CLI)
        uses: microsoft/setup-msbuild@v2

      - name: Set OCCT_ROOT (GitHub Actions)
        shell: pwsh
        run: |
          # Download and extract OCCT 7.8 (Windows x64) if not cached
          $occtUrl = "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V7_8_0/occt-7.8.0-vc14-64.zip"
          $occtZip = "occt.zip"
          $occtRoot = "$env:GITHUB_WORKSPACE\occt-7.8.0-vc14-64"
          
          Invoke-WebRequest -Uri $occtUrl -OutFile $occtZip
          Expand-Archive -Path $occtZip -DestinationPath $env:GITHUB_WORKSPACE -Force
          
          echo "OCCT_ROOT=$occtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OCCT_ROOT=$occtRoot"

      - name: Build OCCT C++/CLI Wrapper
        shell: pwsh
        run: |
          .\scripts\Build-OcctWrapper.ps1

      - name: Run tests
        run: dotnet test tests/ThreeDAnalyzer.Tests/ThreeDAnalyzer.Tests.csproj -c Release --verbosity minimal

      - name: Publish Web App (Release)
        run: |
          dotnet publish src/ThreeDAnalyzer.Web/ThreeDAnalyzer.Web.csproj `
            -c Release `
            -o "${{ github.workspace }}/publish" `
            --no-self-contained

      - name: Copy OCCT Runtime DLLs to publish folder
        shell: pwsh
        run: |
          .\scripts\Copy-OcctRuntime.ps1 -Configuration Release
          
          # Also copy to the publish output
          $publishOut = "${{ github.workspace }}/publish"
          Copy-Item -Path "src\ThreeDAnalyzer.Web\bin\Release\net10.0\*.dll" -Destination $publishOut -Force -ErrorAction SilentlyContinue
          Write-Host "OCCT DLLs copied to publish folder"

      - name: Deploy via Web Deploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: publish
