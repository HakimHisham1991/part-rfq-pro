name: Deploy to MonsterASP.NET (Full OCCT)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild (for C++/CLI)
        uses: microsoft/setup-msbuild@v2

      # OCCT Cache & Download
      - name: Cache OCCT
        id: cache-occt
        uses: actions/cache@v4
        with:
          path: occt-vc143-64
          key: occt-7.8.0-vc143-64

      - name: Download and Setup OCCT
        if: steps.cache-occt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading OCCT..." -ForegroundColor Cyan
          Invoke-WebRequest -Uri "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V7_8_0/occt-vc143-64.zip" -OutFile "occt.zip"
          Invoke-WebRequest -Uri "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V7_8_0/3rdparty-vc14-64.zip" -OutFile "3rdparty.zip"
          Expand-Archive -Path "occt.zip" -DestinationPath . -Force
          Expand-Archive -Path "3rdparty.zip" -DestinationPath . -Force

      - name: Set OCCT_ROOT
        shell: pwsh
        run: |
          $occtRoot = "$env:GITHUB_WORKSPACE\occt-vc143-64"
          echo "OCCT_ROOT=$occtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build OCCT C++/CLI Wrapper
        shell: pwsh
        env:
          OCCT_ROOT: ${{ env.OCCT_ROOT }}
        run: .\scripts\Build-OcctWrapper.ps1

      - name: Publish Web App (OCCT Disabled - Test)
        run: |
          dotnet publish src/ThreeDAnalyzer.Web/ThreeDAnalyzer.Web.csproj `
            -c Release `
            -o "${{ github.workspace }}/publish" `
            --runtime win-x64 `
            --self-contained false `
            -p:UseOcct=false

      - name: Copy OCCT + Wrapper Files
        shell: pwsh
        run: |
          $publishPath = "${{ github.workspace }}/publish"
          
          Write-Host "=== Copying OCCT Wrapper and Runtime Files ==="
          
          # Explicit copy of main wrapper
          Copy-Item -Path "src\ThreeDAnalyzer.OcctWrapper\x64\Release\ThreeDAnalyzer.OcctWrapper.dll" `
                    -Destination $publishPath -Force -ErrorAction Stop
          
          # Run your copy script
          .\scripts\Copy-OcctRuntime.ps1 -Configuration Release
          
          # Extra safety copy
          Get-ChildItem -Path "src\ThreeDAnalyzer.Web\bin\Release\net10.0\win-x64" -Filter "*.dll" -Recurse -ErrorAction SilentlyContinue |
            Copy-Item -Destination $publishPath -Force -ErrorAction SilentlyContinue
          
          # Show final result for debugging
          Write-Host "=== DLLs in Publish Folder ==="
          Get-ChildItem $publishPath -Filter "*.dll" | Select-Object Name

      - name: Deploy to MonsterASP (Web Deploy)
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: site68527
          server-computer-name: https://site68527.siteasp.net:8172
          server-username: site68527
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: publish
